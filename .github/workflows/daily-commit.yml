name: Daily Green Square

on:
  schedule:
    - cron: '0 9 * * *'  # Runs every day at 9 AM UTC (2:30 PM IST)
  workflow_dispatch:       # Lets you trigger it manually from GitHub UI

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make a random commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MESSAGES=(
            "Keep building 🚀"
            "One commit at a time 💻"
            "Consistency is key 🔑"
            "Stay curious 🧠"
            "Progress over perfection 🎯"
            "Another day, another push 💪"
            "Code. Commit. Repeat. 🔁"
            "Grinding in silence 🤫"
            "The grind never stops ⚡"
            "Building something great 🏗️"
          )
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

          echo "$TIMESTAMP — $RANDOM_MSG" >> daily_log.txt
          git add daily_log.txt
          git commit -m "chore: daily log [$TIMESTAMP]"
          git push
